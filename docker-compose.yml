name: prefer

services:
  prefer:
    profiles:
      - PreFer
    build:
      context: ./docker/prefer
      dockerfile: Dockerfile
    image: prefer:local
    ports:
      - "${LLM_PORT:-8080}:8080"
    volumes:
      - llm-model-cache:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - LLAMA_ARG_MODELS_PRESET=${LLAMA_ARG_MODELS_PRESET:-}
      - LLAMA_ARG_MODELS_MAX=${LLAMA_ARG_MODELS_MAX:-1}
      - PRESTAGE_MODELS=${PRESTAGE_MODELS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  llm-model-cache:
    name: ${LLM_MODEL_VOLUME:-prefer-model-cache}
