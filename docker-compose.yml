services:
  multiple-moe:
    build:
      context: ./docker/multiple-moe
      dockerfile: Dockerfile
    image: multiple-moe:local
    ports:
      - "${LLM_PORT:-8080}:8080"
    volumes:
      - ${LLM_MODEL_PATH:-./model-cache}:/models
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - LLAMA_ARG_MODELS_PRESET=${LLAMA_ARG_MODELS_PRESET:-}
      - LLAMA_ARG_MODELS_MAX=${LLAMA_ARG_MODELS_MAX:-1}
      - PRESTAGE_MODELS=${PRESTAGE_MODELS:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]