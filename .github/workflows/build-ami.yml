name: Build PreFer AMI

# Isolated from the container build: only AMI inputs (Packer template + baked
# boot scripts) trigger this. Changes under docker/prefer/** never do.
on:
  push:
    branches: [main]
    paths:
      - 'aws/packer/**'
      - 'aws/boot/**'
      - '.github/workflows/build-ami.yml'
  workflow_dispatch:
    inputs:
      region:
        description: Region to build the AMI in
        default: us-east-1
      copy_regions:
        description: Comma-separated regions to copy the AMI into (public copies)
        default: us-east-2
      prefer_image:
        description: Container image to bake as offline fallback (blank = ghcr.io/<repo>:latest)
        default: ''

permissions:
  id-token: write   # OIDC for AWS auth
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v3
        with:
          version: latest

      # Requires an IAM role for GitHub OIDC with EC2 image-build permissions,
      # stored as the AWS_PACKER_ROLE_ARN repo secret.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ github.event.inputs.region || 'us-east-1' }}

      # GHCR image names must be lowercase, but github.repository is cvalusek/PreFer.
      - name: Resolve container image
        id: img
        run: |
          if [ -n "${{ github.event.inputs.prefer_image }}" ]; then
            echo "image=${{ github.event.inputs.prefer_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_OUTPUT"
          fi

      # Packer list vars take a JSON array via PKR_VAR_*; turn the comma-separated
      # workflow input into ["us-east-2", ...]. Empty input -> [] (build region only).
      - name: Resolve copy regions
        id: regions
        run: |
          raw="${{ github.event.inputs.copy_regions }}"
          raw="${raw:-us-east-2}"
          json=$(echo "$raw" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' \
            | awk 'BEGIN{printf "["} {printf "%s\"%s\"", sep, $0; sep=","} END{printf "]"}')
          echo "json=$json" >> "$GITHUB_OUTPUT"

      - name: packer init
        working-directory: aws/packer
        run: packer init prefer-ami.pkr.hcl

      - name: packer build
        working-directory: aws/packer
        env:
          PKR_VAR_region: ${{ github.event.inputs.region || 'us-east-1' }}
          PKR_VAR_copy_regions: ${{ steps.regions.outputs.json }}
          PKR_VAR_prefer_image: ${{ steps.img.outputs.image }}
        run: packer build prefer-ami.pkr.hcl

      # Turn Packer's manifest into a region -> ami-id map and publish it as an
      # artifact. build-cdk consumes this to bake the RegionMap into the released
      # template. artifact_id looks like "us-east-1:ami-abc,us-east-2:ami-def".
      - name: Build region -> AMI map
        working-directory: aws/packer
        run: |
          jq -r '.builds[-1].artifact_id' packer-manifest.json \
            | jq -R 'split(",") | map(split(":") | {(.[0]): .[1]}) | add' \
            > ami-map.json
          echo "ami-map.json:"; cat ami-map.json

      - name: Upload AMI map
        uses: actions/upload-artifact@v4
        with:
          name: ami-map
          path: aws/packer/ami-map.json
          retention-days: 90
